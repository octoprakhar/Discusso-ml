name: Build and Push to Docker Hub

## We need to tell when it will run
on:
    push:
        branches: ["main"] ## Everytime I push to main branch

jobs:
    build-and-push:
        runs-on: ubuntu-latest
    
        steps:
            ## First copy the copy from github to VM ubuntu
          - name: Checkout code
            uses: actions/checkout@v4

            ## Then log in to docker hub
          - name: Login to Docker Hub
            uses: docker/login-action@v3
            with:
                username: ${{secrets.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

            ## Setting up 'Buildx' for building docker image
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3

            ## Build and Push
          - name: Build and push
            uses: docker/build-push-action@v5
            with:
                context: .
                push: true
                tags: prakhar869/discusso-backend:latest



